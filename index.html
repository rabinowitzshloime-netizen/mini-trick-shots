<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Trick Shots</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f0f0f0;display:flex;justify-content:center;padding:1rem;min-height:100vh;}
#app{width:100%;max-width:960px;display:flex;flex-direction:column;align-items:center;}
.screen{width:100%;display:none;flex-direction:column;align-items:center;}
.screen.active{display:flex;}
#home-title-wrap{text-align:center;margin-bottom:8px;line-height:1.1;}
#home-title-mini{font-family:'Permanent Marker',cursive,system-ui;font-size:32px;color:#E24B4A;display:inline-block;transform:rotate(-2deg);}
#home-title-main{font-family:'Permanent Marker',cursive,system-ui;font-size:54px;color:#1a1a2e;display:inline-block;transform:rotate(1deg);}
#home-sub{font-size:15px;color:#666;margin-bottom:2rem;}
.lcards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-bottom:1.5rem;}
.lcard{background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:0.7rem;cursor:pointer;text-align:center;transition:border-color 0.15s;}
.lcard:hover{border-color:#aaa;}
.lcard svg{width:100%;height:85px;display:block;margin-bottom:6px;border-radius:8px;}
.lcard-name{font-size:12px;font-weight:700;color:#111;margin-bottom:2px;}
.lcard-desc{font-size:10px;color:#888;}
#glvl{font-size:11px;font-weight:700;color:#888;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:0.8rem;}
#lives-row{display:flex;gap:8px;margin-bottom:0.8rem;}
.ldot{width:13px;height:13px;border-radius:50%;background:#E24B4A;}
.ldot.gone{background:#ddd;}
#scene-wrap{width:100%;height:400px;border-radius:14px;border:1px solid #e0e0e0;overflow:hidden;position:relative;margin-bottom:1rem;background:#fff;}
canvas{position:absolute;inset:0;width:100%;height:100%;}
#meter-outer{width:100%;margin-bottom:0.8rem;}
#meter-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
#meter-info span{font-size:12px;color:#999;}
#difficulty-badge{font-size:12px;font-weight:700;padding:3px 12px;border-radius:10px;background:#f0f0f0;color:#555;border:1px solid #e0e0e0;}
#meter-track{width:100%;height:38px;border-radius:19px;overflow:visible;position:relative;border:1px solid #e0e0e0;cursor:pointer;}
#meter-bg{position:absolute;inset:0;background:#FCEBEB;border-radius:19px;overflow:hidden;}
#meter-perfect{position:absolute;top:0;bottom:0;background:#C0DD97;transition:width 0.4s,left 0.4s;}
#meter-needle{position:absolute;top:5px;bottom:5px;width:9px;border-radius:5px;background:#111;}
#meter-arrow{position:absolute;bottom:-26px;font-size:18px;transform:translateX(-50%);pointer-events:none;transition:left 0.4s,color 0.4s;font-weight:700;}
#tap-btn{width:100%;padding:14px;font-size:16px;font-weight:700;border-radius:14px;border:1px solid #ccc;background:#fff;color:#111;cursor:pointer;margin-top:32px;}
#tap-btn:hover{background:#f5f5f5;}
#tap-btn:active{transform:scale(0.98);}
#msg{font-size:18px;font-weight:700;margin-top:0.7rem;min-height:26px;text-align:center;}
#streak-row{font-size:13px;color:#888;margin-top:4px;min-height:18px;}
#back-btn{margin-top:0.6rem;font-size:13px;color:#aaa;background:none;border:none;cursor:pointer;padding:4px 8px;}
#back-btn:hover{color:#333;}
</style>
</head>
<body>
<div id="app">
  <div class="screen active" id="home-screen">
    <div id="home-title-wrap">
      <div id="home-title-mini">Mini</div><br>
      <div id="home-title-main">Trick Shots</div>
    </div>
    <div id="home-sub">Pick a shot — zone shrinks each time you nail it</div>
    <div class="lcards">
      <div class="lcard" onclick="startLevel(0)">
        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="80" fill="#1a6b3a" rx="6"/>
          <rect y="58" width="120" height="22" fill="#c8a050"/>
          <line x1="14" y1="22" x2="14" y2="58" stroke="#fff" stroke-width="2"/>
          <line x1="14" y1="22" x2="38" y2="22" stroke="#fff" stroke-width="2"/>
          <rect x="7" y="11" width="10" height="14" fill="#fff" stroke="#185FA5" stroke-width="1" rx="1"/>
          <line x1="32" y1="22" x2="44" y2="22" stroke="#E24B4A" stroke-width="3"/>
          <circle cx="90" cy="32" r="7" fill="#1a1a2e"/>
          <line x1="90" y1="20" x2="90" y2="44" stroke="#E24B4A" stroke-width="3"/>
          <line x1="90" y1="44" x2="84" y2="58" stroke="#1a1a2e" stroke-width="2.5"/>
          <line x1="90" y1="44" x2="96" y2="58" stroke="#1a1a2e" stroke-width="2.5"/>
          <circle cx="68" cy="24" r="5" fill="#D85A30"/>
        </svg>
        <div class="lcard-name">Full court shot</div>
        <div class="lcard-desc">Backwards throw</div>
      </div>
      <div class="lcard" onclick="startLevel(1)">
        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="80" fill="#e8d9c0" rx="6"/>
          <rect x="10" y="10" width="100" height="60" fill="#c8b890" rx="3"/>
          <rect x="14" y="27" width="50" height="26" fill="#1a1a2e" rx="3"/>
          <rect x="16" y="29" width="46" height="22" fill="#378ADD" rx="2"/>
          <rect x="14" y="37" width="4" height="6" fill="#5DCAA5" rx="1"/>
          <line x1="64" y1="40" x2="76" y2="40" stroke="#5DCAA5" stroke-width="2"/>
          <rect x="76" y="33" width="18" height="14" fill="#333" rx="2"/>
          <rect x="78" y="37" width="6" height="6" fill="#5DCAA5" rx="1"/>
        </svg>
        <div class="lcard-name">Phone slide</div>
        <div class="lcard-desc">Hit the charger</div>
      </div>
      <div class="lcard" onclick="startLevel(2)">
        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="80" fill="#f5f0e8" rx="6"/>
          <rect x="5" y="48" width="110" height="28" fill="#c8b890" rx="3"/>
          <rect x="5" y="44" width="110" height="6" fill="#a08060" rx="2"/>
          <rect x="52" y="12" width="16" height="34" fill="#5DCAA5" rx="4"/>
          <rect x="54" y="6" width="12" height="10" fill="#1D9E75" rx="2"/>
        </svg>
        <div class="lcard-name">Bottle flip</div>
        <div class="lcard-desc">Land on the table</div>
      </div>
      <div class="lcard" onclick="startLevel(3)">
        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="80" fill="#d4c8b8" rx="6"/>
          <rect x="54" y="6" width="14" height="10" rx="2" fill="#c8b898" stroke="#999" stroke-width="0.5"/>
          <line x1="61" y1="16" x2="61" y2="50" stroke="#777" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M61,50 A20,20 0 1,0 41,30" fill="none" stroke="#888" stroke-width="3.5" stroke-linecap="round"/>
          <circle cx="41" cy="30" r="3.5" fill="#aaa"/>
          <circle cx="88" cy="42" r="8" fill="#d4a820"/>
          <circle cx="88" cy="42" r="5" fill="#e8c840"/>
        </svg>
        <div class="lcard-name">Keys on hook</div>
        <div class="lcard-desc">Toss and hook it</div>
      </div>
      <div class="lcard" onclick="startLevel(4)">
        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="80" fill="#2a3a2a" rx="6"/>
          <polygon points="0,52 120,52 100,36 20,36" fill="#1a6a9a"/>
          <line x1="20" y1="36" x2="0" y2="52" stroke="#fff" stroke-width="1"/>
          <line x1="100" y1="36" x2="120" y2="52" stroke="#fff" stroke-width="1"/>
          <line x1="20" y1="36" x2="100" y2="36" stroke="#fff" stroke-width="1"/>
          <rect x="52" y="18" width="16" height="22" rx="2" fill="#c0392b"/>
          <ellipse cx="60" cy="18" rx="8" ry="3" fill="rgba(0,0,0,0.4)"/>
          <circle cx="30" cy="54" r="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
        </svg>
        <div class="lcard-name">Ping pong</div>
        <div class="lcard-desc">Bounce into cup</div>
      </div>
      <div class="lcard" onclick="startLevel(5)">
        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a4a"/><stop offset="60%" stop-color="#c0502a"/><stop offset="100%" stop-color="#f0a040"/></linearGradient></defs>
          <rect width="120" height="80" fill="url(#sg)" rx="6"/>
          <circle cx="60" cy="42" r="10" fill="#ffcc44" opacity="0.9"/>
          <rect x="0" y="52" width="120" height="28" fill="#1a0f25" rx="0"/>
          <rect x="0" y="50" width="120" height="5" fill="#281838"/>
          <ellipse cx="30" cy="52" rx="15" ry="4" fill="#c06020" opacity="0.5"/>
          <ellipse cx="90" cy="52" rx="10" ry="3" fill="#c06020" opacity="0.3"/>
          <rect x="78" y="38" width="42" height="16" fill="#4a2e14" rx="2"/>
          <rect x="80" y="40" width="8" height="12" fill="#8a5a30"/>
          <rect x="90" y="40" width="8" height="12" fill="#7a4e28"/>
          <rect x="100" y="40" width="8" height="12" fill="#8a5a30"/>
          <rect x="110" y="40" width="8" height="12" fill="#7a4e28"/>
          <ellipse cx="45" cy="52" rx="5" ry="2" fill="#7a7868"/>
        </svg>
        <div class="lcard-name">Stone skipping</div>
        <div class="lcard-desc">Skip across the lake</div>
      </div>
    </div>
  </div>
  <div class="screen" id="game-screen">
    <div id="glvl">Level</div>
    <div id="lives-row">
      <div class="ldot" id="ld0"></div>
      <div class="ldot" id="ld1"></div>
      <div class="ldot" id="ld2"></div>
    </div>
    <div id="scene-wrap"><canvas id="scene" width="960" height="400"></canvas></div>
    <div id="meter-outer">
      <div id="meter-info">
        <span>Too weak</span>
        <div id="difficulty-badge">Perfect zone: 14%</div>
        <span>Too strong</span>
      </div>
      <div id="meter-track">
        <div id="meter-bg"><div id="meter-perfect"></div></div>
        <div id="meter-needle"></div>
        <div id="meter-arrow">▲</div>
      </div>
    </div>
    <button id="tap-btn">Tap to throw</button>
    <div id="msg"></div>
    <div id="streak-row"></div>
    <button id="back-btn" onclick="goHome()">← Menu</button>
  </div>
</div><script>
const W=960,H=400;
const canvas=document.getElementById('scene');
const ctx=canvas.getContext('2d');
const needle=document.getElementById('meter-needle');
const track=document.getElementById('meter-track');
const meterPerfect=document.getElementById('meter-perfect');
const meterArrow=document.getElementById('meter-arrow');
const tapBtn=document.getElementById('tap-btn');
const msgEl=document.getElementById('msg');
const streakEl=document.getElementById('streak-row');
const diffBadge=document.getElementById('difficulty-badge');
const LEVEL_DATA=[
  {name:'Basketball — backwards full court',btn:'Tap to throw'},
  {name:'Phone slide — birds eye view',btn:'Tap to slide'},
  {name:'Bottle flip — land it on the table',btn:'Tap to flip'},
  {name:'Keys on hook — toss it!',btn:'Tap to toss'},
  {name:'Ping pong — bounce it in!',btn:'Tap to throw'},
  {name:'Stone skipping — skip it across!',btn:'Tap to skip'}
];
const TABLE_TOP=255,BOTTLE_H=82,BOTTLE_W=32;
const HOOP_X=165,HOOP_Y=105,PLAYER_X=760,PLAYER_Y=320,FLOOR_Y=328,BALL_R=20;
const MX=400,MY=65,STEM_BOT_Y=MY+135,ARC_R=42;
const ARC_CX=MX-ARC_R,ARC_CY=STEM_BOT_Y;
const TIP_X=MX-ARC_R,TIP_Y=STEM_BOT_Y-ARC_R;
const HAND_X=750,HAND_Y=305;
const PP_TABLE_NEAR_Y=340,PP_TABLE_FAR_Y=200;
const PP_TABLE_LEFT_NEAR=20,PP_TABLE_RIGHT_NEAR=880;
const PP_TABLE_LEFT_FAR=280,PP_TABLE_RIGHT_FAR=620;
const PP_WALL_Y=60;
const PP_CUP_CX=W/2,PP_CUP_TOP_Y=PP_TABLE_FAR_Y-10;
const PP_CUP_W_TOP=36,PP_CUP_W_BOT=26,PP_CUP_H=38;
const PP_HAND_X=680,PP_HAND_Y=340;
const PP_BALL_R=10;
const SS_WATER_Y=185,SS_FAR_BANK_Y=148,SS_STONE_R=8;
const SS_PX=570,SS_PY=310;
const SS_SHOULDER_X=SS_PX-10,SS_SHOULDER_Y=SS_PY-85;
const SS_ARM_LEN=35;
const SS_ANGLE_START=-Math.PI/2,SS_ANGLE_END=Math.PI/2,SS_ANGLE_REL=-0.25;
const SS_REL_T=(SS_ANGLE_REL-SS_ANGLE_START)/(SS_ANGLE_END-SS_ANGLE_START);
const SS_REL_X=SS_SHOULDER_X+Math.cos(SS_ANGLE_REL)*SS_ARM_LEN;
const SS_REL_Y=SS_SHOULDER_Y+Math.sin(SS_ANGLE_REL)*SS_ARM_LEN;
const SS_SKIP1={x:SS_REL_X-95,y:SS_WATER_Y},SS_SKIP2={x:SS_REL_X-162,y:SS_WATER_Y},SS_SKIP3={x:SS_REL_X-214,y:SS_WATER_Y};
const SS_LAND={x:SS_REL_X-248,y:SS_FAR_BANK_Y+12},SS_WEAK_LAND={x:SS_REL_X-55,y:SS_WATER_Y};
let mPos=0,mDir=1,animId=null,locked=false,lives=3,curLevel=0,flyRaf=null;
let perfectWidth=14,perfectLeft=43,streak=0,mSpeed=0.5;
let idleT=0,idleRaf=null,wallCracks=[],shakeX=0,shakeY=0,ssRipples=[];

function setPerfect(){
  const tw=track.offsetWidth;
  meterPerfect.style.width=(perfectWidth/100*tw)+'px';
  meterPerfect.style.left=(perfectLeft/100*tw)+'px';
  const mid=perfectLeft+perfectWidth/2;
  meterArrow.style.left=(mid/100*tw)+'px';
  meterPerfect.style.background=perfectWidth>10?'#C0DD97':perfectWidth>6?'#EF9F27':'#E24B4A';
  meterArrow.style.color=perfectWidth>10?'#3aaa3a':perfectWidth>6?'#cc8800':'#cc2222';
  diffBadge.textContent='Perfect zone: '+Math.round(perfectWidth)+'%';
}
function isPerfect(p){return p>=perfectLeft&&p<=perfectLeft+perfectWidth;}
function updateLives(){[0,1,2].forEach(i=>{document.getElementById('ld'+i).className='ldot'+(i>=lives?' gone':'');});}
function goHome(){
  cancelAnimationFrame(animId);cancelAnimationFrame(flyRaf);cancelAnimationFrame(idleRaf);
  document.getElementById('home-screen').className='screen active';
  document.getElementById('game-screen').className='screen';
}
function startLevel(idx){
  curLevel=idx;lives=3;locked=false;streak=0;
  perfectWidth=14;perfectLeft=43;mSpeed=0.5;wallCracks=[];ssRipples=[];
  document.getElementById('home-screen').className='screen';
  document.getElementById('game-screen').className='screen active';
  document.getElementById('glvl').textContent=LEVEL_DATA[idx].name;
  tapBtn.textContent=LEVEL_DATA[idx].btn;
  tapBtn.style.display='';
  document.getElementById('meter-outer').style.display='';
  streakEl.textContent='';
  updateLives();setPerfect();resetToIdle();startMeter();
}
function resetToIdle(){
  cancelAnimationFrame(idleRaf);idleT=0;
  if(curLevel===0)animateIdle();else drawScene('idle',0,0.5);
}
function animateIdle(){idleT+=0.03;drawBasketball('idle',0,0.5,idleT);idleRaf=requestAnimationFrame(animateIdle);}
function startMeter(){
  locked=false;msgEl.textContent='';msgEl.style.color='';
  cancelAnimationFrame(animId);mPos=0;mDir=1;meterLoop();
}
function meterLoop(){
  mPos+=mDir*mSpeed;
  if(mPos>=100){mPos=100;mDir=-1;}
  if(mPos<=0){mPos=0;mDir=1;}
  needle.style.left=Math.round(mPos/100*(track.offsetWidth-11))+'px';
  animId=requestAnimationFrame(meterLoop);
}
function eio(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function lerp(a,b,t){return a+(b-a)*t;}

function doShot(){
  if(locked)return;
  locked=true;cancelAnimationFrame(animId);cancelAnimationFrame(idleRaf);
  const pos=mPos,ok=isPerfect(pos),norm=pos/100;
  const isWeak=norm<(perfectLeft/100);
  const isStrong=norm>(perfectLeft+perfectWidth)/100;
  if(curLevel===0&&isWeak){
    runWeakShot(norm,()=>{
      lives--;updateLives();streak=0;streakEl.textContent='';
      msgEl.textContent='Too weak - fell short!';msgEl.style.color='#c0392b';
      if(lives<=0){showGameOver();return;}
      setTimeout(()=>{resetToIdle();startMeter();},1400);
    });
    return;
  }
  if(curLevel===3&&isStrong){runBreakWall(norm);return;}
  if(curLevel===4&&isWeak){
    runPingPongWeak(()=>{
      lives--;updateLives();streak=0;streakEl.textContent='';
      msgEl.textContent='Too weak - bounced short!';msgEl.style.color='#c0392b';
      if(lives<=0){showGameOver();return;}
      setTimeout(()=>{resetToIdle();startMeter();},1800);
    });
    return;
  }
  if(curLevel===5&&isWeak){
    runStoneWeak(()=>{
      lives--;updateLives();streak=0;streakEl.textContent='';
      msgEl.textContent='Too weak — it sank!';msgEl.style.color='#c0392b';
      if(lives<=0){showGameOver();return;}
      setTimeout(()=>{resetToIdle();startMeter();},2000);
    });
    return;
  }
  let t=0;
  function fly(){
    t+=0.018;
    if(curLevel===5)t+=0.006;
    if(t<1){drawScene('fly',t,norm);flyRaf=requestAnimationFrame(fly);}
    else{
      drawScene(ok?'success':'fail',1,norm);
      if(ok){
        streak++;
        msgEl.textContent=curLevel===2?'Perfect landing!':curLevel===3?'Hooked it!':curLevel===4?'In the cup!':curLevel===5?'Perfect skip!':'Swish!';
        msgEl.style.color='#27ae60';
        streakEl.textContent=streak>1?'Streak: '+streak+' - speeding up!':'';
        perfectWidth=Math.max(3,perfectWidth-2.5);
        perfectLeft=Math.max(5,Math.min(95-perfectWidth,perfectLeft+(Math.random()-0.5)*8));
        mSpeed=Math.min(3.5,mSpeed*1.18);
        setTimeout(()=>{setPerfect();msgEl.textContent='';streakEl.textContent=streak>1?'Streak: '+streak+'!':'';resetToIdle();startMeter();},1800);
      }else{
        streak=0;streakEl.textContent='';lives--;updateLives();
        if(lives<=0){showGameOver();return;}
        const wm=curLevel===2?"Didn't spin enough!":curLevel===3?'Too weak!':curLevel===4?'Too weak - bounced short!':curLevel===5?'Too weak — it sank!':'Too weak!';
        const sm=curLevel===2?"Spun too much!":curLevel===3?'Too strong!':curLevel===4?'Too strong - smashed the wall!':curLevel===5?'Too strong — crashed the bank!':'Too strong!';
        msgEl.textContent=pos<perfectLeft?wm:sm;
        msgEl.style.color='#c0392b';
        setTimeout(()=>{resetToIdle();startMeter();},1800);
      }
    }
  }
  fly();
}
function drawScene(phase,t,power){
  if(curLevel===0)drawBasketball(phase,t,power,0);
  else if(curLevel===1)drawPhoneBirdsEye(phase,t,power);
  else if(curLevel===2)drawBottle(phase,t,power);
  else if(curLevel===3)drawKeysLevel(phase,t,power);
  else if(curLevel===4)drawPingPong(phase,t,power);
  else drawStoneSkip(phase,t,power);
}
</script><script>
function drawCourt(){
  ctx.fillStyle='#1a6b3a';ctx.fillRect(0,0,W,H);
  for(var i=0;i<W;i+=90){ctx.fillStyle=i%180===0?'#1c7040':'#186535';ctx.fillRect(i,0,90,H);}
  ctx.fillStyle='#c8a050';ctx.fillRect(0,FLOOR_Y,W,H-FLOOR_Y);
  for(var i=0;i<W;i+=66){ctx.fillStyle='#b88a30';ctx.fillRect(i,FLOOR_Y,33,H-FLOOR_Y);}
  ctx.fillStyle='#8a6820';ctx.fillRect(0,FLOOR_Y,W,5);
}
function drawHoop(){
  ctx.strokeStyle='#bbb';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(82,90);ctx.lineTo(82,FLOOR_Y);ctx.stroke();
  ctx.strokeStyle='#aaa';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(82,90);ctx.lineTo(170,90);ctx.stroke();
  ctx.fillStyle='#fff';ctx.strokeStyle='#185FA5';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(64,46,24,48,3);ctx.fill();ctx.stroke();
  ctx.fillStyle='#185FA5';ctx.fillRect(70,52,12,3);ctx.fillRect(70,60,12,3);
  ctx.strokeStyle='#E24B4A';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(144,HOOP_Y);ctx.lineTo(192,HOOP_Y);ctx.stroke();
  for(var i=0;i<7;i++){ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(148+i*6,HOOP_Y);ctx.lineTo(145+i*6,HOOP_Y+22);ctx.stroke();}
}
function drawBall(x,y,rot){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);
  ctx.beginPath();ctx.arc(0,0,BALL_R,0,Math.PI*2);ctx.fillStyle='#D85A30';ctx.fill();
  ctx.strokeStyle='#993C1D';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-BALL_R,0);ctx.lineTo(BALL_R,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-BALL_R);ctx.lineTo(0,BALL_R);ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,BALL_R,0,Math.PI*2);ctx.strokeStyle='#993C1D';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}
function drawPlayer(armAngle,holdBall,iT){
  var x=PLAYER_X,y=PLAYER_Y,bounce=Math.sin(iT)*2,by=y+bounce;
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.roundRect(x-14,by-52,28,38,4);ctx.fill();

  if(mode==='perfect'){
    if(t<0.28){var pe=eio(t/0.28);return{x:lerp(SS_REL_X,SS_SKIP1.x,pe),y:lerp(SS_REL_Y,SS_WATER_Y,pe)-Math.sin(Math.PI*pe)*45,r:SS_STONE_R,rot:t*Math.PI*4,skip:t/0.28>0.93};}
    else if(t<0.54){var pe=eio((t-0.28)/0.26);return{x:lerp(SS_SKIP1.x,SS_SKIP2.x,pe),y:SS_WATER_Y-Math.sin(Math.PI*pe)*30,r:SS_STONE_R*0.93,rot:t*Math.PI*4,skip:(t-0.28)/0.26>0.93};}
    else if(t<0.76){var pe=eio((t-0.54)/0.22);return{x:lerp(SS_SKIP2.x,SS_SKIP3.x,pe),y:SS_WATER_Y-Math.sin(Math.PI*pe)*18,r:SS_STONE_R*0.86,rot:t*Math.PI*4,skip:(t-0.54)/0.22>0.93};}
    else{var pe=eio((t-0.76)/0.24);return{x:lerp(SS_SKIP3.x,SS_LAND.x,pe),y:lerp(SS_WATER_Y,SS_LAND.y,pe),r:SS_STONE_R*0.8,rot:t*Math.PI*4};}
  }else{
    var pe=eio(t);return{x:lerp(SS_REL_X,SS_LAND.x-25,pe),y:lerp(SS_REL_Y,SS_FAR_BANK_Y+5,pe)-Math.sin(Math.PI*pe)*12,r:SS_STONE_R,rot:t*Math.PI*5};
  }
}
function ssDrawStone(x,y,r,rot){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot||0);
  ctx.fillStyle='#7a7868';ctx.beginPath();ctx.ellipse(0,0,r,r*0.55,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#9a9880';ctx.beginPath();ctx.ellipse(-r*0.15,-r*0.1,r*0.5,r*0.25,0.3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#5a5848';ctx.lineWidth=0.8;ctx.beginPath();ctx.ellipse(0,0,r,r*0.55,0,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}
function ssDrawRipple(x,y,age,maxAge){
  var p=age/maxAge,r=4+p*30,alpha=0.55*(1-p);
  ctx.strokeStyle='rgba(255,180,60,'+alpha+')';ctx.lineWidth=1.5*(1-p*0.5);
  ctx.beginPath();ctx.ellipse(x,y,r,r*0.28,0,0,Math.PI*2);ctx.stroke();
  if(p<0.55){ctx.strokeStyle='rgba(255,200,100,'+(alpha*0.5)+')';ctx.lineWidth=0.8;ctx.beginPath();ctx.ellipse(x,y,r*0.45,r*0.12,0,0,Math.PI*2);ctx.stroke();}
}
function runStoneWeak(onDone){
  var t=0,done=false,sinkDone=false;
  function step(){
    if(done)return;
    ctx.clearRect(0,0,W,H);ssSunsetScene();
    ssRipples.forEach(function(r){ssDrawRipple(r.x,r.y,r.age,r.maxAge);r.age++;});
    ssRipples=ssRipples.filter(function(r){return r.age<r.maxAge;});
    ssBridge();
    var throwT=Math.min(1,t/0.22);
    var arm=ssDrawPerson(throwT);
    if(throwT<SS_REL_T) ssDrawStone(arm.hx,arm.hy,SS_STONE_R,0.3);
    t+=0.014;
    if(t<0.4){var pe=eio(t/0.4);var sx=lerp(SS_REL_X,SS_WEAK_LAND.x,pe),sy=lerp(SS_REL_Y,SS_WATER_Y,pe)-Math.sin(Math.PI*pe)*32;ssDrawStone(sx,sy,SS_STONE_R,t*Math.PI*4);}
    else{
      var pe=eio((t-0.4)/0.6);var sx=lerp(SS_WEAK_LAND.x,SS_WEAK_LAND.x-15,pe),sy=SS_WATER_Y+pe*28;
      if(!sinkDone&&t>=0.4){ssRipples.push({x:SS_WEAK_LAND.x,y:SS_WATER_Y,age:0,maxAge:70});sinkDone=true;}
      ctx.save();ctx.globalAlpha=Math.max(0,1-(sy-SS_WATER_Y)/25);ssDrawStone(sx,sy,SS_STONE_R*(1-pe*0.7),t*Math.PI*3);ctx.restore();
    }
    if(t>=1){done=true;onDone();return;}
    flyRaf=requestAnimationFrame(step);
  }
  step();
}
function drawStoneSkip(phase,t,pw){
  ctx.clearRect(0,0,W,H);ssSunsetScene();
  ssRipples.forEach(function(r){ssDrawRipple(r.x,r.y,r.age,r.maxAge);});
  ssBridge();
  var isWeak=pw<(perfectLeft/100),isStrong=pw>(perfectLeft+perfectWidth)/100;
  var mode=isWeak?'weak':isStrong?'strong':'perfect';
  if(phase==='idle'){var arm=ssDrawPerson(0);ssDrawStone(arm.hx,arm.hy,SS_STONE_R,0.3);return;}
  var throwT=Math.min(1,t/0.22);
  var arm=ssDrawPerson(throwT);
  if(throwT<SS_REL_T) ssDrawStone(arm.hx,arm.hy,SS_STONE_R,0.3);
  if(phase==='fly'){
    var p=ssStonePos(t,mode);
    if(p.skip){ssRipples.push({x:p.x,y:SS_WATER_Y,age:0,maxAge:55});}
    ssRipples.forEach(function(r){r.age++;});ssRipples=ssRipples.filter(function(r){return r.age<r.maxAge;});
    if(p.y<SS_WATER_Y+10){var sh=Math.max(0,1-Math.abs(SS_WATER_Y-p.y)/42);ctx.fillStyle='rgba(0,0,0,'+sh*0.15+')';ctx.beginPath();ctx.ellipse(p.x,SS_WATER_Y+1,p.r*1.4,p.r*0.3,0,0,Math.PI*2);ctx.fill();}
    if(throwT>=SS_REL_T) ssDrawStone(p.x,p.y,p.r,p.rot);
  }else if(phase==='success'){
    ssDrawStone(SS_LAND.x,SS_LAND.y,SS_STONE_R*0.8,0.2);
    [SS_SKIP1,SS_SKIP2,SS_SKIP3].forEach(function(s){ssDrawRipple(s.x,s.y,20,55);});
    confetti();ctx.fillStyle='#f0c040';ctx.font='bold 28px system-ui';ctx.textAlign='center';ctx.fillText('Perfect skip!',W/2,65);
  }else if(phase==='fail'){
    ssDrawStone(SS_LAND.x-25,SS_FAR_BANK_Y+14,SS_STONE_R,0.4);
    ctx.fillStyle='rgba(100,60,20,0.3)';ctx.beginPath();ctx.ellipse(SS_LAND.x-25,SS_FAR_BANK_Y+16,16,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e05030';ctx.font='bold 22px system-ui';ctx.textAlign='center';ctx.fillText('Too strong — crashed the bank!',W/2,65);
  }
}
function confetti(){
  var cols=['#D85A30','#639922','#378ADD','#D4537E','#EF9F27','#5DCAA5'];
  for(var i=0;i<22;i++){ctx.fillStyle=cols[i%cols.length];ctx.save();ctx.translate(W*0.1+i*40,80+Math.sin(i*1.3)*28);ctx.rotate(i*0.6);ctx.fillRect(-5,-4,10,8);ctx.restore();}
}
function showGameOver(){
  tapBtn.style.display='none';document.getElementById('meter-outer').style.display='none';
  cancelAnimationFrame(idleRaf);cancelAnimationFrame(flyRaf);
  msgEl.style.color='#c0392b';msgEl.style.fontSize='20px';msgEl.textContent='Out of lives!';
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#FCEBEB';ctx.fillRect(0,0,W,H);
  ctx.font='bold 58px system-ui';ctx.textAlign='center';
  ctx.fillStyle='#c0392b';ctx.fillText('Game Over',W/2,H/2-10);
  ctx.font='22px system-ui';ctx.fillStyle='#e74c3c';ctx.fillText('Longest streak: '+streak,W/2,H/2+34);
  var btn=document.createElement('button');
  btn.textContent='Play Again';
  btn.style.cssText='margin-top:1rem;padding:14px 40px;font-size:16px;font-weight:700;border-radius:12px;border:1px solid #ccc;background:#fff;cursor:pointer;';
  btn.onclick=function(){location.reload();};
  document.getElementById('game-screen').appendChild(btn);
}
tapBtn.addEventListener('click',doShot);
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();doShot();}});
</script>
