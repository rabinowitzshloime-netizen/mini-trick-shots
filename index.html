<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Trick Shots</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f0f0f0;display:flex;justify-content:center;align-items:flex-start;padding:1rem;min-height:100vh;}
#app{width:100%;max-width:900px;display:flex;flex-direction:column;align-items:center;}
.screen{width:100%;display:none;flex-direction:column;align-items:center;}
.screen.active{display:flex;}
#home-title{font-size:36px;font-weight:700;color:#111;margin-bottom:6px;}
#home-sub{font-size:15px;color:#666;margin-bottom:2rem;}
.lcards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%;margin-bottom:1.5rem;}
.lcard{background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:1.1rem;cursor:pointer;text-align:center;transition:border-color 0.15s;}
.lcard:hover{border-color:#aaa;}
.lcard svg{width:100%;height:110px;display:block;margin-bottom:10px;border-radius:8px;}
.lcard-name{font-size:15px;font-weight:700;color:#111;margin-bottom:3px;}
.lcard-desc{font-size:12px;color:#888;}
#glvl{font-size:12px;font-weight:700;color:#888;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:0.8rem;}
#lives-row{display:flex;gap:8px;margin-bottom:0.8rem;}
.ldot{width:14px;height:14px;border-radius:50%;background:#E24B4A;}
.ldot.gone{background:#ddd;}
#scene-wrap{width:100%;height:420px;border-radius:14px;border:1px solid #e0e0e0;overflow:hidden;position:relative;margin-bottom:1rem;background:#fff;}
canvas{position:absolute;inset:0;width:100%;height:100%;}
#meter-outer{width:100%;margin-bottom:0.8rem;}
#meter-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
#meter-info span{font-size:12px;color:#999;}
#difficulty-badge{font-size:12px;font-weight:700;padding:3px 12px;border-radius:10px;background:#f0f0f0;color:#555;border:1px solid #e0e0e0;}
#meter-track{width:100%;height:40px;border-radius:20px;overflow:visible;position:relative;border:1px solid #e0e0e0;cursor:pointer;}
#meter-bg{position:absolute;inset:0;background:#FCEBEB;border-radius:20px;overflow:hidden;}
#meter-perfect{position:absolute;top:0;bottom:0;background:#C0DD97;transition:width 0.4s,left 0.4s;}
#meter-needle{position:absolute;top:5px;bottom:5px;width:10px;border-radius:5px;background:#111;}
#meter-arrow{position:absolute;bottom:-24px;font-size:20px;transform:translateX(-50%);pointer-events:none;transition:left 0.4s,color 0.4s;font-weight:700;}
#tap-btn{width:100%;padding:16px;font-size:17px;font-weight:700;border-radius:14px;border:1px solid #ccc;background:#fff;color:#111;cursor:pointer;margin-top:30px;}
#tap-btn:hover{background:#f5f5f5;}
#tap-btn:active{transform:scale(0.98);}
#msg{font-size:20px;font-weight:700;margin-top:0.7rem;min-height:28px;text-align:center;}
#streak-row{font-size:13px;color:#888;margin-top:4px;min-height:18px;}
#back-btn{margin-top:0.6rem;font-size:13px;color:#aaa;background:none;border:none;cursor:pointer;padding:4px 8px;}
#back-btn:hover{color:#333;}
</style>
</head>
<body>
<div id="app">
  <div class="screen active" id="home-screen">
    <div id="home-title">Mini Trick Shots</div>
    <div id="home-sub">Pick a shot — zone shrinks each time you nail it</div>
    <div class="lcards">
      <div class="lcard" onclick="startLevel(0)">
        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="80" fill="#1a6b3a" rx="6"/>
          <rect y="58" width="120" height="22" fill="#c8a050"/>
          <line x1="14" y1="22" x2="14" y2="58" stroke="#fff" stroke-width="2"/>
          <line x1="14" y1="22" x2="38" y2="22" stroke="#fff" stroke-width="2"/>
          <rect x="7" y="11" width="10" height="14" fill="#fff" stroke="#185FA5" stroke-width="1" rx="1"/>
          <line x1="32" y1="22" x2="44" y2="22" stroke="#E24B4A" stroke-width="3"/>
          <circle cx="90" cy="32" r="7" fill="#1a1a2e"/>
          <line x1="90" y1="20" x2="90" y2="44" stroke="#E24B4A" stroke-width="3"/>
          <line x1="90" y1="44" x2="84" y2="58" stroke="#1a1a2e" stroke-width="2.5"/>
          <line x1="90" y1="44" x2="96" y2="58" stroke="#1a1a2e" stroke-width="2.5"/>
          <circle cx="68" cy="24" r="5" fill="#D85A30"/>
        </svg>
        <div class="lcard-name">Full court shot</div>
        <div class="lcard-desc">Backwards throw</div>
      </div>
      <div class="lcard" onclick="startLevel(1)">
        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="80" fill="#e8d9c0" rx="6"/>
          <rect x="10" y="10" width="100" height="60" fill="#c8b890" rx="3"/>
          <rect x="14" y="27" width="50" height="26" fill="#1a1a2e" rx="3"/>
          <rect x="16" y="29" width="46" height="22" fill="#378ADD" rx="2"/>
          <rect x="14" y="37" width="4" height="6" fill="#5DCAA5" rx="1"/>
          <line x1="64" y1="40" x2="76" y2="40" stroke="#5DCAA5" stroke-width="2"/>
          <rect x="76" y="33" width="18" height="14" fill="#333" rx="2"/>
          <rect x="78" y="37" width="6" height="6" fill="#5DCAA5" rx="1"/>
        </svg>
        <div class="lcard-name">Phone slide</div>
        <div class="lcard-desc">Slide into the charger</div>
      </div>
      <div class="lcard" onclick="startLevel(2)">
        <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
          <rect width="120" height="80" fill="#f5f0e8" rx="6"/>
          <rect x="5" y="48" width="110" height="28" fill="#c8b890" rx="3"/>
          <rect x="5" y="44" width="110" height="6" fill="#a08060" rx="2"/>
          <rect x="52" y="12" width="16" height="34" fill="#5DCAA5" rx="4"/>
          <rect x="54" y="6" width="12" height="10" fill="#1D9E75" rx="2"/>
          <rect x="53" y="12" width="5" height="24" fill="rgba(255,255,255,0.22)" rx="2"/>
        </svg>
        <div class="lcard-name">Bottle flip</div>
        <div class="lcard-desc">Land it on the table</div>
      </div>
    </div>
  </div>
  <div class="screen" id="game-screen">
    <div id="glvl">Basketball</div>
    <div id="lives-row">
      <div class="ldot" id="ld0"></div>
      <div class="ldot" id="ld1"></div>
      <div class="ldot" id="ld2"></div>
    </div>
    <div id="scene-wrap"><canvas id="scene" width="900" height="420"></canvas></div>
    <div id="meter-outer">
      <div id="meter-info">
        <span>Too weak</span>
        <div id="difficulty-badge">Perfect zone: 14%</div>
        <span>Too strong</span>
      </div>
      <div id="meter-track">
        <div id="meter-bg"><div id="meter-perfect"></div></div>
        <div id="meter-needle"></div>
        <div id="meter-arrow">▲</div>
      </div>
    </div>
    <button id="tap-btn">Tap to throw</button>
    <div id="msg"></div>
    <div id="streak-row"></div>
    <button id="back-btn" onclick="goHome()">Back to menu</button>
  </div>
</div><script>
const W=900,H=420;
const canvas=document.getElementById('scene');
const ctx=canvas.getContext('2d');
const needle=document.getElementById('meter-needle');
const track=document.getElementById('meter-track');
const meterPerfect=document.getElementById('meter-perfect');
const meterArrow=document.getElementById('meter-arrow');
const tapBtn=document.getElementById('tap-btn');
const msgEl=document.getElementById('msg');
const streakEl=document.getElementById('streak-row');
const diffBadge=document.getElementById('difficulty-badge');
const LEVEL_DATA=[
  {name:'Basketball — backwards full court',btn:'Tap to throw'},
  {name:'Phone slide — birds eye view',btn:'Tap to slide'},
  {name:'Bottle flip — land it on the table',btn:'Tap to flip'}
];
const TABLE_TOP=280,BOTTLE_H=90,BOTTLE_W=36;
const HOOP_X=160,HOOP_Y=100,PLAYER_X=730,PLAYER_Y=330,FLOOR_Y=338,BALL_R=22;
let mPos=0,mDir=1,animId=null,locked=false,lives=3,curLevel=0,flyRaf=null;
let perfectWidth=14,perfectLeft=43,streak=0,mSpeed=0.5;
let idleT=0,idleRaf=null;
function setPerfect(){
  const tw=track.offsetWidth;
  meterPerfect.style.width=(perfectWidth/100*tw)+'px';
  meterPerfect.style.left=(perfectLeft/100*tw)+'px';
  const midPct=perfectLeft+perfectWidth/2;
  meterArrow.style.left=(midPct/100*tw)+'px';
  meterPerfect.style.background=perfectWidth>10?'#C0DD97':perfectWidth>6?'#EF9F27':'#E24B4A';
  meterArrow.style.color=perfectWidth>10?'#3aaa3a':perfectWidth>6?'#cc8800':'#cc2222';
  diffBadge.textContent='Perfect zone: '+Math.round(perfectWidth)+'%';
}
function isPerfect(p){return p>=perfectLeft&&p<=perfectLeft+perfectWidth;}
function goHome(){
  cancelAnimationFrame(animId);cancelAnimationFrame(flyRaf);cancelAnimationFrame(idleRaf);
  document.getElementById('home-screen').className='screen active';
  document.getElementById('game-screen').className='screen';
}
function startLevel(idx){
  curLevel=idx;lives=3;locked=false;streak=0;
  perfectWidth=14;perfectLeft=43;mSpeed=0.5;
  document.getElementById('home-screen').className='screen';
  document.getElementById('game-screen').className='screen active';
  document.getElementById('glvl').textContent=LEVEL_DATA[idx].name;
  tapBtn.textContent=LEVEL_DATA[idx].btn;
  tapBtn.style.display='';
  document.getElementById('meter-outer').style.display='';
  streakEl.textContent='';
  updateLives();setPerfect();resetToIdle();startMeter();
}
function updateLives(){
  [0,1,2].forEach(i=>{document.getElementById('ld'+i).className='ldot'+(i>=lives?' gone':'');});
}
function resetToIdle(){
  cancelAnimationFrame(idleRaf);idleT=0;
  if(curLevel===0)animateIdle();else drawScene('idle',0,0.5);
}
function animateIdle(){idleT+=0.03;drawBasketball('idle',0,0.5,idleT);idleRaf=requestAnimationFrame(animateIdle);}
function startMeter(){
  locked=false;msgEl.textContent='';msgEl.style.color='';
  cancelAnimationFrame(animId);mPos=0;mDir=1;meterLoop();
}
function meterLoop(){
  mPos+=mDir*mSpeed;
  if(mPos>=100){mPos=100;mDir=-1;}
  if(mPos<=0){mPos=0;mDir=1;}
  needle.style.left=Math.round(mPos/100*(track.offsetWidth-12))+'px';
  animId=requestAnimationFrame(meterLoop);
}
function eio(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function doShot(){
  if(locked)return;
  locked=true;cancelAnimationFrame(animId);cancelAnimationFrame(idleRaf);
  const pos=mPos,ok=isPerfect(pos),norm=pos/100;
  const isWeak=norm<(perfectLeft/100);
  if(curLevel===0&&isWeak){
    runWeakShot(norm,()=>{
      lives--;updateLives();streak=0;streakEl.textContent='';
      msgEl.textContent='Too weak - fell short!';msgEl.style.color='#c0392b';
      if(lives<=0){showGameOver();return;}
      setTimeout(()=>{resetToIdle();startMeter();},1400);
    });
    return;
  }
  let t=0;
  function fly(){
    t+=0.018;
    if(t<1){drawScene('fly',t,norm);flyRaf=requestAnimationFrame(fly);}
    else{
      drawScene(ok?'success':'fail',1,norm);
      if(ok){
        streak++;
        msgEl.textContent=curLevel===2?'Perfect landing!':'Swish!';
        msgEl.style.color='#27ae60';
        streakEl.textContent=streak>1?'Streak: '+streak+' - zone shrinking!':'';
        perfectWidth=Math.max(3,perfectWidth-2.5);
        perfectLeft=Math.max(5,Math.min(95-perfectWidth,perfectLeft+(Math.random()-0.5)*8));
        mSpeed=Math.min(1.4,mSpeed+0.08);
        setTimeout(()=>{setPerfect();msgEl.textContent='';streakEl.textContent=streak>1?'Streak: '+streak+'!':'';resetToIdle();startMeter();},1800);
      }else{
        streak=0;streakEl.textContent='';lives--;updateLives();
        if(lives<=0){showGameOver();return;}
        const weakMsg=curLevel===2?"Didn't spin enough!":"Too weak - fell short!";
        const strongMsg=curLevel===2?"Spun too much!":"Too strong - overshot!";
        msgEl.textContent=pos<perfectLeft?weakMsg:strongMsg;
        msgEl.style.color='#c0392b';
        setTimeout(()=>{resetToIdle();startMeter();},1800);
      }
    }
  }
  fly();
}
function drawScene(phase,t,power){
  if(curLevel===0)drawBasketball(phase,t,power,0);
  else if(curLevel===1)drawPhoneBirdsEye(phase,t,power);
  else drawBottle(phase,t,power);
}function drawCourt(){
  ctx.fillStyle='#1a6b3a';ctx.fillRect(0,0,W,H);
  for(var i=0;i<W;i+=90){ctx.fillStyle=i%180===0?'#1c7040':'#186535';ctx.fillRect(i,0,90,H);}
  ctx.fillStyle='#c8a050';ctx.fillRect(0,FLOOR_Y,W,H-FLOOR_Y);
  for(var i=0;i<W;i+=66){ctx.fillStyle='#b88a30';ctx.fillRect(i,FLOOR_Y,33,H-FLOOR_Y);}
  ctx.fillStyle='#8a6820';ctx.fillRect(0,FLOOR_Y,W,5);
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,FLOOR_Y);ctx.lineTo(W,FLOOR_Y);ctx.stroke();
}
function drawHoop(){
  ctx.strokeStyle='#bbb';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(80,90);ctx.lineTo(80,FLOOR_Y);ctx.stroke();
  ctx.strokeStyle='#aaa';ctx.lineWidth=3.5;ctx.beginPath();ctx.moveTo(80,90);ctx.lineTo(165,90);ctx.stroke();
  ctx.fillStyle='#fff';ctx.strokeStyle='#185FA5';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.roundRect(62,45,26,50,3);ctx.fill();ctx.stroke();
  ctx.fillStyle='#185FA5';ctx.fillRect(68,52,14,3);ctx.fillRect(68,60,14,3);
  ctx.strokeStyle='#E24B4A';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(142,HOOP_Y);ctx.lineTo(188,HOOP_Y);ctx.stroke();
  for(var i=0;i<7;i++){ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(146+i*6,HOOP_Y);ctx.lineTo(143+i*6,HOOP_Y+24);ctx.stroke();}
}
function drawBall(x,y,rot){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);
  ctx.beginPath();ctx.arc(0,0,BALL_R,0,Math.PI*2);ctx.fillStyle='#D85A30';ctx.fill();
  ctx.strokeStyle='#993C1D';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-BALL_R,0);ctx.lineTo(BALL_R,0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-BALL_R);ctx.lineTo(0,BALL_R);ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,BALL_R,0,Math.PI*2);ctx.strokeStyle='#993C1D';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}
function drawPlayerPose(armAngle,holdBall,iT){
  var x=PLAYER_X,y=PLAYER_Y,bounce=Math.sin(iT)*2,by=y+bounce;
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.roundRect(x-15,by-58,30,42,4);ctx.fill();
  ctx.fillStyle='#E24B4A';ctx.beginPath();ctx.roundRect(x-12,by-55,24,36,3);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.roundRect(x-9,by-52,8,26,2);ctx.fill();
  ctx.fillStyle='#c8956a';ctx.beginPath();ctx.ellipse(x,by-72,14,15,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.ellipse(x,by-86,15,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(x-4,by-88,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+4,by-88,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.roundRect(x-18,by-16,15,48,4);ctx.fill();ctx.beginPath();ctx.roundRect(x+3,by-16,15,48,4);ctx.fill();
  ctx.fillStyle='#c0392b';ctx.beginPath();ctx.roundRect(x-16,by-13,12,42,3);ctx.fill();ctx.beginPath();ctx.roundRect(x+4,by-13,12,42,3);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(x-15,by+27,11,9,3);ctx.fill();ctx.beginPath();ctx.roundRect(x+4,by+27,11,9,3);ctx.fill();
  var lax=x+Math.cos(armAngle)*33,lay=by-42+Math.sin(armAngle)*33;
  ctx.strokeStyle='#c8956a';ctx.lineWidth=11;
  ctx.beginPath();ctx.moveTo(x,by-42);ctx.lineTo(lax,lay);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,by-42);ctx.lineTo(x+Math.cos(-armAngle+0.4)*30,by-42+Math.sin(-armAngle+0.4)*30);ctx.stroke();
  if(holdBall)drawBall(lax,lay,0);
}
function ballPosCurve(t,mode){
  var e=eio(t);
  if(mode==='perfect'){
    var sx=PLAYER_X,sy=PLAYER_Y-105,ex=HOOP_X,ey=HOOP_Y,mx=(sx+ex)/2,my=Math.min(sy,ey)-160;
    return{x:(1-e)*(1-e)*sx+2*(1-e)*e*mx+e*e*ex,y:(1-e)*(1-e)*sy+2*(1-e)*e*my+e*e*ey};
  }
  var sx=PLAYER_X,sy=PLAYER_Y-105,ex=30,ey=FLOOR_Y-BALL_R,mx=(sx+ex)/2-50,my=sy-200;
  return{x:(1-e)*(1-e)*sx+2*(1-e)*e*mx+e*e*ex,y:(1-e)*(1-e)*sy+2*(1-e)*e*my+e*e*ey};
}
function drawBasketball(phase,t,pw,iT){
  ctx.clearRect(0,0,W,H);drawCourt();drawHoop();
  if(phase==='idle'){drawPlayerPose(-Math.PI*0.15+Math.sin(iT*0.8)*0.12,true,iT);return;}
  drawPlayerPose(-Math.PI*0.85*eio(Math.min(1,t*2.5)),false,0);
  var isStrong=pw>(perfectLeft+perfectWidth)/100,mode=isStrong?'strong':'perfect';
  if(phase==='fly'){
    var trail=[];
    for(var i=0;i<20;i++)trail.push(ballPosCurve(i/20*t,mode));
    for(var i=1;i<trail.length;i++){ctx.strokeStyle='rgba(216,90,48,'+(i/trail.length*0.35)+')';ctx.lineWidth=6*(i/trail.length);ctx.beginPath();ctx.moveTo(trail[i-1].x,trail[i-1].y);ctx.lineTo(trail[i].x,trail[i].y);ctx.stroke();}
    var p=ballPosCurve(t,mode);drawBall(p.x,p.y,t*Math.PI*5);
  }else if(phase==='success'){
    for(var i=1;i<20;i++){var fp=ballPosCurve(i/20,'perfect');ctx.fillStyle='rgba(216,90,48,'+(i/20*0.2)+')';ctx.beginPath();ctx.arc(fp.x,fp.y,4,0,Math.PI*2);ctx.fill();}
    drawBall(HOOP_X,HOOP_Y,0);
    for(var i=0;i<4;i++){ctx.strokeStyle='rgba(255,255,255,'+(0.7-i*0.18)+')';ctx.lineWidth=3-i*0.5;ctx.beginPath();ctx.arc(HOOP_X,HOOP_Y,24+i*13,0,Math.PI*2);ctx.stroke();}
    confetti();ctx.fillStyle='#fff';ctx.font='bold 36px system-ui';ctx.textAlign='center';ctx.fillText('SWISH!',W/2,200);
  }else if(phase==='fail'){
    var p=ballPosCurve(1,'strong');
    for(var i=1;i<20;i++){var fp=ballPosCurve(i/20,'strong');ctx.fillStyle='rgba(216,90,48,'+(i/20*0.25)+')';ctx.beginPath();ctx.arc(fp.x,fp.y,4,0,Math.PI*2);ctx.fill();}
    drawBall(p.x,FLOOR_Y-BALL_R,Math.PI*0.3);
    ctx.fillStyle='#c0392b';ctx.font='bold 22px system-ui';ctx.textAlign='center';ctx.fillText('Too strong - overshot!',W/2,220);
  }
}
function runWeakShot(norm,onDone){
  var bx=PLAYER_X,by=PLAYER_Y-105,vx=-5.5,vy=-8,rot=0,settling=false,settleFrames=0,done=false;
  var floorY=FLOOR_Y-BALL_R;
  function step(){
    if(done)return;
    ctx.clearRect(0,0,W,H);drawCourt();drawHoop();drawPlayerPose(-Math.PI*0.85,false,0);
    if(!settling){vy+=0.6;bx+=vx;by+=vy;if(by>=floorY){by=floorY;vy=-vy*0.52;vx*=0.88;if(Math.abs(vy)<1.8){settling=true;vy=0;}}rot+=vx*0.18;}
    else{vx*=0.82;bx+=vx;rot+=vx*0.18;settleFrames++;if(Math.abs(vx)<0.2||settleFrames>80){done=true;drawBall(bx,floorY,rot);onDone();return;}}
    if(by<floorY){var sa=0.15+0.15*(1-(floorY-by)/200),ss=0.5+0.5*(1-(floorY-by)/200);ctx.save();ctx.globalAlpha=sa;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(bx,floorY+3,BALL_R*ss,5*ss,0,0,Math.PI*2);ctx.fill();ctx.restore();}
    drawBall(bx,Math.min(by,floorY),rot);flyRaf=requestAnimationFrame(step);
  }
  step();
}function drawPhoneBirdsEye(phase,t,pw){
  var TX=80,TY=40,TW=740,TH=300;
  ctx.fillStyle='#b0956a';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#c8a870';for(var i=0;i<W;i+=34){for(var j=0;j<H;j+=34){ctx.fillRect(i,j,16,16);}}
  ctx.fillStyle='#c4a870';ctx.beginPath();ctx.roundRect(TX-10,TY-10,TW+20,TH+20,10);ctx.fill();
  var grains=['#ddd0b0','#e8d9b8','#d8c8a0','#e0d2b2'];
  for(var i=0;i<8;i++){ctx.fillStyle=grains[i%grains.length];ctx.fillRect(TX+i*(TW/8),TY,TW/8,TH);}
  ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=0.5;
  for(var i=1;i<8;i++){ctx.beginPath();ctx.moveTo(TX+i*(TW/8),TY);ctx.lineTo(TX+i*(TW/8),TY+TH);ctx.stroke();}
  var CX=TX+TW-80,CY=TY+TH/2;
  ctx.fillStyle='#3a3a3a';ctx.beginPath();ctx.roundRect(CX-20,CY-34,44,68,6);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.roundRect(CX-12,CY-12,24,24,5);ctx.fill();
  ctx.fillStyle='#5DCAA5';ctx.beginPath();ctx.roundRect(CX-8,CY-8,16,16,3);ctx.fill();
  ctx.strokeStyle='#666';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(CX-28,CY);ctx.lineTo(CX-20,CY);ctx.stroke();
  ctx.fillStyle='#888';ctx.beginPath();ctx.roundRect(CX-38,CY-8,12,16,2);ctx.fill();
  ctx.fillStyle='#5DCAA5';ctx.beginPath();ctx.roundRect(CX-36,CY-5,8,10,2);ctx.fill();
  ctx.strokeStyle='#555';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(CX+24,CY);ctx.lineTo(TX+TW+30,CY);ctx.stroke();
  var startX=TX+60,startY=CY,endX=CX-40,endY=CY,PW=80,PH=40;
  var ppx,ppy,wobble=0,trail=[];
  if(phase==='idle'){ppx=startX;ppy=startY;}
  else if(phase==='fly'){
    var e=eio(t),shortfall=pw<(perfectLeft/100),overshoot=pw>(perfectLeft+perfectWidth)/100;
    var targetX=shortfall?startX+(endX-startX)*0.55:(overshoot?endX+80:endX);
    var drift=(overshoot||shortfall)?((0.5-pw)*30*Math.sin(t*Math.PI)):0;
    ppx=startX+(targetX-startX)*e;ppy=startY+drift*(1-e);wobble=(1-e)*Math.sin(t*Math.PI*3)*0.04;
    for(var i=1;i<=16;i++){var ft=eio(i/16*t);trail.push({x:startX+(targetX-startX)*ft,y:startY+drift*(1-ft)});}
  }else if(phase==='success'){ppx=endX+3;ppy=endY;}
  else{ppx=pw<(perfectLeft/100)?startX+(endX-startX)*0.55:endX+90;ppy=startY;wobble=0.15;}
  if(trail.length>1){for(var i=1;i<trail.length;i++){var a=(i/trail.length)*0.28;ctx.strokeStyle='rgba(55,138,221,'+a+')';ctx.lineWidth=PH*0.6*(i/trail.length);ctx.beginPath();ctx.moveTo(trail[i-1].x,trail[i-1].y);ctx.lineTo(trail[i].x,trail[i].y);ctx.stroke();}}
  ctx.save();ctx.translate(ppx,ppy);ctx.rotate(wobble);
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(3,4,PW/2+4,PH/2+4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.roundRect(-PW/2,-PH/2,PW,PH,6);ctx.fill();
  ctx.fillStyle='#378ADD';ctx.beginPath();ctx.roundRect(-PW/2+3,-PH/2+3,PW-18,PH-6,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.roundRect(-PW/2+4,-PH/2+4,9,PH-12,2);ctx.fill();
  ctx.fillStyle='#5DCAA5';ctx.beginPath();ctx.roundRect(PW/2-9,-4,9,9,2);ctx.fill();
  ctx.restore();
  if(phase==='success'){confetti();ctx.fillStyle='#27ae60';ctx.font='bold 30px system-ui';ctx.textAlign='center';ctx.fillText('Plugged in!',W/2,TY-8);}
}
function drawTableScene(){
  ctx.fillStyle='#f0ebe0';ctx.fillRect(0,0,W,H);
  var grains=['#ddd0b0','#e8d9b8','#d8c8a0','#e0d2b2','#daccaa'];
  for(var i=0;i<5;i++){ctx.fillStyle=grains[i%grains.length];ctx.fillRect(i*(W/5),TABLE_TOP,W/5,H-TABLE_TOP);}
  ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=0.5;
  for(var i=1;i<5;i++){ctx.beginPath();ctx.moveTo(i*(W/5),TABLE_TOP);ctx.lineTo(i*(W/5),H);ctx.stroke();}
  ctx.fillStyle='#a08060';ctx.fillRect(0,TABLE_TOP,W,8);
  ctx.fillStyle='#8a6040';ctx.fillRect(0,TABLE_TOP,W,4);
  for(var i=0;i<5;i++){ctx.fillStyle='#8a6040';ctx.beginPath();ctx.roundRect(40+i*175,H-28,28,30,4);ctx.fill();}
  ctx.fillStyle='#c8a870';ctx.fillRect(0,0,W,TABLE_TOP);
  for(var i=0;i<15;i++){ctx.fillStyle=i%2?'#e0d8c8':'#ece4d4';ctx.fillRect(i*64,0,64,TABLE_TOP);}
}
function drawBottleShape(cx,bottomY,angle){
  ctx.save();ctx.translate(cx,bottomY-BOTTLE_H/2);ctx.rotate(angle);
  ctx.fillStyle='#5DCAA5';ctx.beginPath();ctx.roundRect(-BOTTLE_W/2,-BOTTLE_H/2,BOTTLE_W,BOTTLE_H,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.beginPath();ctx.roundRect(-BOTTLE_W/2+3,-BOTTLE_H/2+4,12,BOTTLE_H-10,4);ctx.fill();
  ctx.fillStyle='#1D9E75';ctx.beginPath();ctx.roundRect(-BOTTLE_W/2+3,-BOTTLE_H/2-18,BOTTLE_W-6,22,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.roundRect(-BOTTLE_W/2+4,-BOTTLE_H/2-16,8,16,3);ctx.fill();
  ctx.restore();
}
function drawBottle(phase,t,pw){
  ctx.clearRect(0,0,W,H);drawTableScene();
  var cx=W/2,idleBottomY=TABLE_TOP;
  if(phase==='idle'){
    drawBottleShape(cx,idleBottomY,0);
    ctx.fillStyle='rgba(0,0,0,0.1)';ctx.beginPath();ctx.ellipse(cx,TABLE_TOP+4,20,6,0,0,Math.PI*2);ctx.fill();
    return;
  }
  var e=eio(t),isWeak=pw<(perfectLeft/100),isStrong=pw>(perfectLeft+perfectWidth)/100;
  var peakH=isWeak?90:isStrong?320:220;
  var spins=isWeak?0.7:isStrong?2.8:1.0;
  var by=idleBottomY-Math.sin(Math.PI*e)*peakH;
  var angle=e*Math.PI*2*spins;
  if(phase==='fly'){
    var shadowScale=Math.max(0.2,1-(idleBottomY-by)/peakH*0.8);
    ctx.fillStyle='rgba(0,0,0,0.07)';ctx.beginPath();ctx.ellipse(cx,TABLE_TOP+4,20*shadowScale,6*shadowScale,0,0,Math.PI*2);ctx.fill();
    drawBottleShape(cx,by,angle);
  }else if(phase==='success'){
    drawBottleShape(cx,idleBottomY,0);
    ctx.fillStyle='rgba(0,0,0,0.1)';ctx.beginPath();ctx.ellipse(cx,TABLE_TOP+4,20,6,0,0,Math.PI*2);ctx.fill();
    for(var i=0;i<4;i++){ctx.strokeStyle='rgba(93,202,165,'+(0.7-i*0.18)+')';ctx.lineWidth=3-i*0.5;ctx.beginPath();ctx.arc(cx,idleBottomY-BOTTLE_H/2,30+i*18,0,Math.PI*2);ctx.stroke();}
    confetti();ctx.fillStyle='#27ae60';ctx.font='bold 34px system-ui';ctx.textAlign='center';ctx.fillText('Nailed it!',cx,TABLE_TOP-30);
  }else if(phase==='fail'){
    var failAngle=isWeak?Math.PI*0.25:Math.PI*1.4;
    drawBottleShape(isWeak?cx-30:cx+30,idleBottomY,failAngle);
    ctx.fillStyle='#c0392b';ctx.font='bold 22px system-ui';ctx.textAlign='center';
    ctx.fillText(isWeak?"Didn't spin enough!":"Spun too much!",cx,TABLE_TOP-30);
  }
}
function confetti(){
  var cols=['#D85A30','#639922','#378ADD','#D4537E','#EF9F27','#5DCAA5'];
  for(var i=0;i<22;i++){ctx.fillStyle=cols[i%cols.length];ctx.save();ctx.translate(W*0.1+i*38,80+Math.sin(i*1.3)*30);ctx.rotate(i*0.6);ctx.fillRect(-5,-4,10,8);ctx.restore();}
}
function showGameOver(){
  tapBtn.style.display='none';document.getElementById('meter-outer').style.display='none';
  cancelAnimationFrame(idleRaf);cancelAnimationFrame(flyRaf);
  msgEl.style.color='#c0392b';msgEl.style.fontSize='22px';msgEl.textContent='Out of lives!';
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#FCEBEB';ctx.fillRect(0,0,W,H);
  ctx.font='bold 60px system-ui';ctx.textAlign='center';
  ctx.fillStyle='#c0392b';ctx.fillText('Game Over',W/2,H/2-10);
  ctx.font='24px system-ui';ctx.fillStyle='#e74c3c';ctx.fillText('Longest streak: '+streak,W/2,H/2+36);
  var btn=document.createElement('button');
  btn.textContent='Play Again';btn.style.marginTop='1rem';btn.style.padding='14px 40px';
  btn.style.fontSize='17px';btn.style.fontWeight='700';btn.style.borderRadius='12px';
  btn.style.border='1px solid #ccc';btn.style.background='#fff';btn.style.cursor='pointer';
  btn.onclick=function(){location.reload();};
  document.getElementById('game-screen').appendChild(btn);
}
tapBtn.addEventListener('click',doShot);
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();doShot();}});
</script>
